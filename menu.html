<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Menu - Chicking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="assets/main.css" rel="stylesheet">

  <style>
    /* ── Menu page specific styles ── */

    /* Navbar — same white + border-bottom style as career.html */
    .menu-navbar {
      background-color: #fff;
      border-bottom: 2px solid #222;
      padding: 16px 20px;
    }
    .menu-navbar .logo {
      height: 57px;
      width: auto;
    }
    .menu-navbar .nav-link {
      font-weight: 600;
      font-size: 16px;
      color: #BE1522 !important;
      padding: 6px 12px;
    }
    .menu-navbar .nav-link:hover,
    .menu-navbar .nav-link.active {
      color: #222 !important;
    }

    /* Mobile full-screen nav */
    @media (max-width: 991.98px) {
      #menuNav {
        background-color: rgba(0, 0, 0, 0.95);
        position: fixed;
        inset: 0;
        z-index: 1050;
        display: flex !important;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: opacity 0.3s;
        opacity: 0;
        pointer-events: none;
      }
      #menuNav.show {
        opacity: 1;
        pointer-events: auto;
      }
      #menuNav .nav-link {
        font-size: 24px !important;
        color: #fff !important;
      }
      #menuNav .nav-link:hover {
        color: #BE1522 !important;
      }
    }

    /* ── Menu content ── */
    .menu-container {
      padding: 80px 60px 60px;
    }

    .menu-section {
      margin-bottom: 60px;
    }

    .menu-section h2 {
      font-weight: 600;
      font-size: 36px;
      color: #BE1522;
      text-align: left;
      margin-bottom: 8px;
    }

    .menu-section hr {
      border: none;
      height: 2px;
      background-color: #222;
      opacity: 1;
      width: 50%;
      margin: 0 0 20px 0;
    }

    .menu-section iframe {
      width: 90%;
      height: 600px;
      border: none;
      display: block;
    }

    /* ── Mobile overrides ── */
    @media (max-width: 991.98px) {
      .menu-container {
        padding: 36px 16px 48px;
      }

      .menu-section h2 {
        font-size: 22px;
        padding-left: 4px;
      }

      .menu-section hr {
        width: 60%;
      }

      .menu-section iframe {
        width: 100%;
        height: 420px;
      }
    }

    @media (max-width: 575.98px) {
      .menu-section iframe {
        height: 340px;
      }
    }
  </style>
</head>

<body>

    </button>

    <!-- Nav Links -->

        <li class="nav-item"><a class="nav-link" href="career.html">CAREER</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#contact">CONTACT US</a></li>
